services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xtire-web
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    container_name: xtire-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - web

networks:
  web:

volumes:
  caddy_data:
  caddy_config:
